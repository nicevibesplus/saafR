<div class="map-page-container">
    <div id="map"></div>

    <div class="fab-container-top">
        <button class="fab" id="layerToggleFAB" data-bs-toggle="modal" data-bs-target="#layerModal" title="Layers">
            <i class="bi bi-layers-fill"></i>
        </button>

        <!-- <button class="fab popup-fab active d-none" id="popupToggleFAB" title="Toggle Accident Info">
            <i class="bi bi-chat-square-text-fill"></i>
        </button> -->

        <button class="fab" id="darkModeSwitch" title="Toggle Dark Mode">
            <i class="bi bi-sun-fill"></i>
        </button>

        <button class="fab" id="toggleRoadNetwork" title="Toggle Road Network">
            <i class="bi bi-map-fill"></i>
        </button>
    </div>

    <div class="bottom-button-container">
        <button class="routing-button" data-bs-toggle="modal" data-bs-target="#routingModal">
            <i class="bi bi-sign-turn-right-fill me-2"></i>
            Routing
        </button>
    </div>

    <div class="location-button-container">
        <button class="fab location-fab" id="locateMeBtn" title="My Location">
            <i class="bi bi-crosshair"></i>
        </button>
    </div>

    <div class="modal fade" id="layerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" id="routeCalculation">
                <div class="modal-header">
                    <h5 class="modal-title">I want to avoid:</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input switch-red" type="checkbox" id="toggleAccidents" unchecked>
                        <label class="form-check-label" for="toggleAccidents">
                            <span class="legend-marker accidents"></span>
                            Accidents
                        </label>
                    </div>

                    <div class="form-check form-switch">
                        <input class="form-check-input switch-yellow" type="checkbox" id="toggleAnxietyZones" unchecked>
                        <label class="form-check-label" for="toggleAnxietyZones">
                            <span class="legend-marker anxiety"></span>
                            Anxiety Zones
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Let's saafr!</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="routingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Route Calculation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <input id="startInput" type="text" class="form-control" placeholder="lat,lng or address">
                        <button class="fab fab-inline" type="button" id="pickStartBtn" title="Pick on map"><i class="bi bi-geo-alt-fill"></i></button>
                    </div>

                    <div class="input-group">
                        <input id="endInput" type="text" class="form-control" placeholder="lat,lng or address">
                        <button class="fab fab-inline" type="button" id="pickEndBtn" title="Pick on map"><i class="bi bi-geo-alt-fill"></i></button>
                    </div>


                    <div class="route-considerations mt-4">
                        <h6 class="mb-2">The routing considers:</h6>
                        <div class="consideration-list">
                            <div class="consideration-item" id="routingAccidentsStatus">
                                <span class="legend-marker accidents"></span>
                                <span class="consideration-text">Accidents</span>
                            </div>
                            <div class="consideration-item" id="routingAnxietyStatus">
                                <span class="legend-marker anxiety"></span>
                                <span class="consideration-text">Anxiety Zones</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="routeBtn" class="btn btn-primary">Start Routing</button>
                </div>
            </div>
        </div>
    </div>
    <div id="routeInfoPanel" class="route-info-panel d-none">
        <div class="card shadow position-relative">

            <button type="button" class="btn-close position-absolute top-0 end-0 mt-n2 me-2" aria-label="Close"
                onclick="(p => { p.classList.add('d-none'); p.querySelector('#route-steps').classList.remove('expanded'); p.querySelector('#route-steps').innerHTML = ''; p.querySelector('#routeTime').textContent = ''; })(this.closest('#routeInfoPanel'))">
            </button>

            <!-- HEADER -->
            <div class="card-body pb-2">
                <div class="d-flex justify-content-between align-items-center gap-3">
                    <div>
                        <div class="small text-muted">Estimated time</div>
                        <div id="routeTime" class="fw-bold fs-5"></div>
                    </div>

                    <button id="startNavigationBtn" class="btn btn-primary btn-sm">
                        Start
                    </button>
                </div>
            </div>

            <!-- ROUTE STEPS -->
            <ul class="list-group list-group-flush route-steps" id = "route-steps"></ul>

        </div>
    </div>


    <div id="navigationPanel" class="navigation-panel d-none">
        <div class="card shadow">
            <div class="card-body">
                <h6 class="mb-2">Navigation</h6>
                <ul id="navigationSteps" class="list-group list-group-flush"></ul>
            </div>
        </div>
    </div>

</div>
