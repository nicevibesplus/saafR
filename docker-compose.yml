services:
  postgis:
    build: ./postgis
    container_name: postgis
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgis/init:/docker-entrypoint-initdb.d:ro
      - ./postgis/data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file: .env
    ports:
      - 15080:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

  node-server:
    build: ./node-server
    container_name: node-server
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  pgadmin-data:
