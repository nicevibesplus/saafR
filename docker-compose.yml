services:
  postgis:
    build: ./postgis
    container_name: postgis
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgis/init:/docker-entrypoint-initdb.d:ro
      - ./postgis/import_osm.sh:/import_osm.sh
      - ./postgis/data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    env_file: .env
    ports:
      - 8080:8080
