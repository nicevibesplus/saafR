services:
  postgis:
    build: ./postgis
    container_name: postgis
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgis/init:/docker-entrypoint-initdb.d:ro
      #- ./postgis/data:/var/lib/postgresql/data
      - ./postgis/crash:/crash:ro
      - ./postgis/streets:/streets:rw

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file: .env
    ports:
      - 15080:80
    volumes:
      # - ./pgadmin/data:/var/lib/pgadmin/
      - ./pgadmin/servers.json:/pgadmin4/servers.json

  node-server:
    build: ./node-server
    container_name: node-server
    env_file: .env
    ports:
      - "3000:3000"

  geoserver:
    image: docker.osgeo.org/geoserver:2.28.0
    container_name: geoserver
    ports:
      - "8080:8080"
    environment:
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
      - GEOSERVER_EXT_DIR=/opt/geoserver/ext_dir
    volumes:
      - ./geoserver/data_dir:/opt/geoserver/data_dir
      - ./geoserver/ext_dir:/opt/geoserver/ext_dir
    restart: unless-stopped

  graphhopper:
    build: ./graphhopper
    container_name: graphhopper
    ports:
      - 8989:8989
    env_file: .env
    volumes:
      - ./graphhopper/data.osm.pbf:/graphhopper/data.osm.pbf  # Persist the graph data
      - ./graphhopper/config.yml:/graphhopper/config.yml  # Custom configuration