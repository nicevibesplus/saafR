<div class="map-page-container">
    <div id="map"></div>

    <div class="fab-container-top">
        <button class="fab" id="layersBtn" title="Layers">
            <i class="bi bi-layers-fill"></i>
        </button>
    </div>

    <div class="bottom-bar-item time-display d-none" id="routeTimeDisplay">
        <i class="bi bi-clock me-2"></i>
        <span id="routeTime">--</span>
    </div>

    <div class="bottom-bar-center">
        <button class="bottom-bar-item routing-button" id="openRoutingBtn">
            <i class="bi bi-sign-turn-right-fill me-2"></i>
            Routing
        </button>
    </div>

    <button class="bottom-bar-item location-btn" id="locateMeBtn" title="My Location">
        <i class="bi bi-crosshair"></i>
    </button>

    <!-- Layers Bottom Sheet -->
    <div class="layers-bottom-sheet" id="layersBottomSheet">
        <div class="layers-sheet-content">
            <div class="layers-sheet-header">
                <span>Map Settings</span>
                <button type="button" class="btn-close" id="closeLayersSheet" aria-label="Close"></button>
            </div>
            
            <div class="layers-row">
                <div class="map-type-section">
                    <h6 class="layers-section-title">Map Type</h6>
                    <div class="map-type-options">
                        <div class="map-type-option active" id="mapTypeLight">
                            <div class="map-type-preview light"></div>
                            <span>Light</span>
                        </div>
                        <div class="map-type-option" id="mapTypeDark">
                            <div class="map-type-preview dark"></div>
                            <span>Dark</span>
                        </div>
                    </div>
                </div>
                
                <div class="layers-toggles-section">
                    <h6 class="layers-section-title">Layers</h6>
                    <div class="layer-toggle-item">
                        <span><i class="bi bi-signpost-2-fill me-2"></i>Roads</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="toggleRoadNetwork">
                        </div>
                    </div>
                    <div class="layer-toggle-item">
                        <span><span class="legend-marker accidents me-2"></span>Accidents</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input switch-red" type="checkbox" id="toggleAccidents">
                        </div>
                    </div>
                    <div class="layer-toggle-item">
                        <span><span class="legend-marker anxiety me-2"></span>Anxiety</span>
                        <div class="form-check form-switch">
                            <input class="form-check-input switch-yellow" type="checkbox" id="toggleAnxietyZones">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="layers-sheet-backdrop" id="layersSheetBackdrop"></div>

    <!-- Routing Top Sheet -->
    <div class="routing-sheet-wrapper">
        <div class="routing-bottom-sheet" id="routingBottomSheet">
            <div class="routing-sheet-content">
                <div class="routing-inputs-container">
                    <div class="input-group mb-2">
                        <input id="startInput" type="text" class="form-control" placeholder="Start: lat,lng or address">
                        <button class="fab fab-inline-sm" type="button" id="pickStartBtn" title="Pick on map"><i class="bi bi-geo-alt-fill"></i></button>
                    </div>
                    <div class="input-group mb-2">
                        <input id="endInput" type="text" class="form-control" placeholder="Destination: lat,lng or address">
                        <button class="fab fab-inline-sm" type="button" id="pickEndBtn" title="Pick on map"><i class="bi bi-geo-alt-fill"></i></button>
                    </div>
                    <div class="routing-actions">
                        <button type="button" id="routeBtn" class="btn routing-go-btn">Start Routing</button>
                        <button type="button" class="btn-close" id="closeRoutingSheet" aria-label="Close"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="routing-sheet-backdrop" id="routingSheetBackdrop"></div>

</div>
