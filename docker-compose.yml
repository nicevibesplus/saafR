services:
  postgis:
    build: ./postgis
    container_name: postgis
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgis/init:/docker-entrypoint-initdb.d:ro
      - ../start_data:/data:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U POSTGRES_USER -d POSTGRES_DB && psql -U POSTGRES_USER -d POSTGRES_DB -tAc 'SELECT 1 FROM crash_road_match LIMIT 1' | grep -q 1"]
      interval: 60s
      timeout: 5s 
      start_period: 30s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file: .env
    ports:
      - 15080:80
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json

  node-server:
    build: ./node-server
    container_name: node-server
    env_file: .env
    ports:
      - "3000:3000"

  geoserver:
    image: docker.osgeo.org/geoserver:2.28.0
    container_name: geoserver
    depends_on:
      - serviceName: postgis
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - geoserver_data/data_dir:/opt/geoserver/data_dir
      - geoserver_data/ext_dir:/opt/geoserver/ext_dir
    restart: unless-stopped

  geoserver-init:
    image: curlimages/curl:latest
    depends_on:
      - geoserver
    volumes:
      - ./geoserver/init_geoserver.sh:/init_geoserver.sh
      - ./geoserver/streets.sld:/streets.sld:ro
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "chmod +x /init_geoserver.sh && 
       echo 'Waiting for GeoServer...' && 
       until curl -s -u admin:geoserver http://geoserver:8080/geoserver/rest/workspaces; do sleep 5; done && 
       /init_geoserver.sh"

  graphhopper:
    build: ./graphhopper
    depends_on:
      - serviceName: postgis
        condition: service_healthy 
    container_name: graphhopper
    ports:
      - 8989:8989
    env_file: .env
    volumes:
      - ../start_data/data.osm.pbf:/graphhopper/data.osm.pbf
      - ./graphhopper/config.yml:/graphhopper/config.yml

volumes:
  pg_data:
  geoserver_data: