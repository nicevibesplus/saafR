<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
                <!-- Navbar Logo -->
                <a class="navbar-brand d-flex align-items-center" href="#" data-page="routingpage">

                <script>

            <div class="collapse navbar-collapse" id="navbarNav">

    <main id="content" class="container py-4">
        <!-- page content gets displayed here -->

    <!-- SaafR shared modules -->

    <script src="js/pages/routingTemplate.js"></script>

    
<!-- Page loader -->
    <script>
        function loadPage(pageName) {
            const content = document.getElementById("content");
            content.innerHTML = "<p>Load page...</p>";

            if (window.unmountPage && typeof window.unmountPage === "function") {
                window.unmountPage();
            }

            delete window.renderPage;
            delete window.unmountPage;

            const oldScript = document.getElementById("pageScript");
            if (oldScript && oldScript.parentNode) {
                oldScript.parentNode.removeChild(oldScript);
            }

            const script = document.createElement("script");
            script.src = pageName + ".js";
            script.id = "pageScript";

            script.onload = () => {
                if (window.renderPage && typeof window.renderPage === "function") {
                    window.renderPage(content);
                }
            };

            document.body.appendChild(script);

            document.querySelectorAll(".nav-link").forEach(link => {
                link.classList.toggle("active", link.getAttribute("data-page") === pageName);
            });
        }

        document.addEventListener("click", (event) => {
            const link = event.target.closest("[data-page]");
            if (link) {
                event.preventDefault();
                const page = link.getAttribute("data-page");
                loadPage(page);

                const navbarCollapse = document.getElementById("navbarNav");
                const bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
                if (bsCollapse) {
                    bsCollapse.hide();
                } else {
                    new bootstrap.Collapse(navbarCollapse, { toggle: false }).hide();
                }
            }
        });

        window.addEventListener("DOMContentLoaded", () => {
            loadPage("routingpage");
        });
    </script>

</html>
