services:
  postgis:
    build: ./postgis
    container_name: postgis
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgis/init:/docker-entrypoint-initdb.d:ro
      #- ./postgis/data:/var/lib/postgresql/data
      - ./postgis/crash:/crash:ro
      - ./postgis/streets:/streets:ro

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file: .env
    ports:
      - 15080:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

  node-server:
    build: ./node-server
    container_name: node-server
    env_file: .env
    ports:
      - "3000:3000"

  graphhopper:
    container_name: graphhopper
    ports:
      - 8989:8989
    image: israelhikingmap/graphhopper
    command: --url https://download.geofabrik.de/europe/germany/nordrhein-westfalen/muenster-regbez-latest.osm.pbf --host 0.0.0.0
    volumes:
      - ./graphhopper/data:/data  # Persist the graph data
      - ./graphhopper/config-example.yml:/graphhopper/config-example.yml  # Custom configuration

  geoserver:
    image: docker.osgeo.org/geoserver:2.28.0
    container_name: geoserver
    ports:
      - "8080:8080"
    environment:
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
      - GEOSERVER_EXT_DIR=/opt/geoserver/ext_dir
    volumes:
      - ./geoserver/data_dir:/opt/geoserver/data_dir
      - ./geoserver/ext_dir:/opt/geoserver/ext_dir
    restart: unless-stopped


volumes:
  pgadmin-data:
